<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MA 22102 EXAM | FULL ENGLISH VERSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f9ff;
            --primary: #007bff;
            --primary-soft: #eef6ff;
            --white: #ffffff;
            --success: #28a745;
            --danger: #dc3545;
            --text: #2c3e50;
        }

        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text); }

        header {
            position: absolute; top: 0; width: 100%; height: 70px;
            background: var(--white); display: flex; justify-content: space-between;
            align-items: center; padding: 0 30px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); z-index: 10;
        }

        .workspace { display: flex; width: 100%; margin-top: 70px; height: calc(100vh - 70px); }
        .quiz-area { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: var(--white); width: 100%; max-width: 750px; padding: 35px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }

        .option-btn {
            display: block; width: 100%; padding: 18px 25px; margin: 12px 0;
            border: 2px solid #edf2f7; border-radius: 18px; background: white;
            text-align: left; font-size: 1.1rem; cursor: pointer; transition: 0.3s ease;
        }
        .option-btn:hover:not(.selected) { border-color: var(--primary); background: var(--primary-soft); }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        .review-item { margin-bottom: 30px; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; background: #fff; }
        .status-tag { display: inline-block; padding: 5px 15px; border-radius: 10px; font-weight: 600; margin-bottom: 12px; }
        .status-correct { background: #d4edda; color: #155724; }
        .status-wrong { background: #f8d7da; color: #721c24; }
        .why-box { margin-top: 15px; padding: 15px; background: #fff9db; border-radius: 12px; font-size: 0.95rem; border-left: 5px solid #fcc419; line-height: 1.5; }

        .scratch-panel { width: 0; background: #ffffff; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; border-left: 1px solid #e2e8f0; }
        .scratch-panel.open { width: 500px; }
        canvas { flex: 1; background: #fafcfe; cursor: crosshair; touch-action: none; }
        .canvas-tools { padding: 20px; background: #f8fafc; display: flex; gap: 10px; border-top: 1px solid #edf2f7; }

        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gray { background: #e2e8f0; color: #4a5568; }
        .timer { font-size: 1.2rem; font-weight: 600; color: var(--primary); background: var(--primary-soft); padding: 5px 18px; border-radius: 50px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.4rem; font-weight: 600; color: var(--primary);">MA 22102 FINAL EXAM</div>
    <div class="timer" id="clock">90:00</div>
    <button class="btn btn-primary" onclick="togglePad()">✏️ Scratchpad</button>
</header>

<div class="workspace">
    <div class="quiz-area">
        <div class="card" id="quiz-ui">
            <div id="q-progress" style="color: #94a3b8; font-weight: 300;"></div>
            <div id="q-text" style="font-size: 1.3rem; font-weight: 600; margin: 15px 0;"></div>
            <img src="" id="q-image" style="width:100%; max-height:280px; object-fit:contain; display:none; border-radius:15px; margin-bottom:20px; background: #f8fafc;">
            
            <div id="options-container"></div>
            
            <div style="display:flex; justify-content:space-between; margin-top:35px;">
                <button class="btn btn-gray" id="back-btn" onclick="move(-1)">Back</button>
                <button class="btn btn-primary" id="next-btn" onclick="move(1)">Next</button>
            </div>
        </div>

        <div id="result-ui" class="card" style="display:none;">
            <div style="text-align:center;">
                <h1 style="color:var(--primary); font-size:4rem; margin:0;" id="final-score"></h1>
                <p style="font-size: 1.2rem; color: #64748b;">Your Final Score</p>
                <button class="btn btn-primary" style="margin-top:10px" onclick="location.reload()">Restart Exam</button>
            </div>
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 40px 0;">
            <h3 style="margin-bottom:20px;">Review & Explanations:</h3>
            <div id="review-list"></div>
        </div>
    </div>

    <div class="scratch-panel" id="pad">
        <div style="padding: 15px; font-weight: 600; text-align: center; border-bottom: 1px solid #edf2f7;">DRAFT AREA</div>
        <canvas id="canvas"></canvas>
        <div class="canvas-tools">
            <button class="btn btn-gray" style="flex:1" onclick="setTool('pen')">🖊 Pen</button>
            <button class="btn btn-gray" style="flex:1" onclick="setTool('erase')">🧽 Eraser</button>
            <button class="btn" style="background:#fff5f5; color:#e03131;" onclick="clearCanvas()">Clear</button>
        </div>
    </div>
</div>

<script>
    const quizData = [
        { q: "1. Determine the lowest value of the stem-leaf plot?", img: "1-3.jpg", opt: ["45", "16", "42", "19"], ans: 1, why: "Look at the first row (Stem 1) and the first leaf (6). The value is 16." },
        { q: "2. Determine the highest value of the stem-leaf plot?", img: "1-3.jpg", opt: ["45", "16", "18", "42"], ans: 0, why: "Look at the last row (Stem 4) and the last leaf (5). The value is 45." },
        { q: "3. What is the range of the stem-leaf plot?", img: "1-3.jpg", opt: ["39", "36", "9", "29"], ans: 3, why: "Range = Max (45) - Min (16) = 29." },
        { q: "4. What is the mean of the data in the dot plot?", img: "4-6.jpg", opt: ["1.5", "3", "2.7", "7.35"], ans: 2, why: "Mean is calculated by summing all values and dividing by the number of dots." },
        { q: "5. Calculate the median of the data in the dot plot.", img: "4-6.jpg", opt: ["2", "4.5", "3.5", "5"], ans: 0, why: "The middle position of all dots falls on the value 2." },
        { q: "6. What is the mode of the dot plot?", img: "4-6.jpg", opt: ["2", "1", "3", "4"], ans: 0, why: "The value 2 has the highest frequency (tallest stack of dots)." },
        { q: "7. What is the median for the set 24, 23, 22, 21, and 20?", img: "", opt: ["20.5", "22", "24.8", "21"], ans: 1, why: "Order the numbers: 20, 21, 22, 23, 24. The middle value is 22." },
        { q: "8. Thalia’s Math test marks are 45, 48, 42, 50, 49, 42. Average Mean?", img: "", opt: ["46.3", "47", "46", "49.3"], ans: 2, why: "(45+48+42+50+49+42) / 6 = 276 / 6 = 46." },
        { q: "9. Which theorem or postulate can be used to prove the triangles are congruent?", img: "9.jpg", opt: ["ASA", "AAS", "SSS", "SAS"], ans: 3, why: "Based on the marks, we have Side-Angle-Side (SAS) congruency." },
        { q: "10. The pair of polygons is congruent by which condition?", img: "10.jpg", opt: ["HL", "SAS", "SSS", "ASA"], ans: 1, why: "Side-Angle-Side condition is met." },
        { q: "11. Triangle relationship shown in the figure?", img: "11.jpg", opt: ["ASA", "SSS", "SAS", "HL"], ans: 1, why: "All three sides are marked equal (Side-Side-Side)." },
        { q: "12. Triangles are congruent by?", img: "12.jpg", opt: ["SSS", "HL", "ASA", "SAS"], ans: 2, why: "Angle-Side-Angle (ASA) congruency." },
        { q: "13. Find the value of x.", img: "13.jpg", opt: ["125", "130", "150", "60"], ans: 0, why: "Interior angles on the same side of the transversal sum to 180°." },
        { q: "14. Find the value of x.", img: "14.jpg", opt: ["109", "71", "29", "120"], ans: 1, why: "Calculated using alternate interior angles or corresponding angles property." },
        { q: "15. Which of the following are alternate interior angles?", img: "15.jpg", opt: ["5&8, 6&7", "5&7, 6&8", "5&6, 7&8", "8&5, 7&8"], ans: 0, why: "Alternate interior angles are on opposite sides of the transversal inside the parallel lines." },
        { q: "16. Which transformation is applied?", img: "16.jpg", opt: ["Dilation", "Rotation", "Reflection", "Translation"], ans: 2, why: "The image is flipped over a line (Reflection)." },
        { q: "17. Which transformation is applied?", img: "17.jpg", opt: ["Rotation", "Translation", "Dilation", "Reflection"], ans: 1, why: "The image is slid to a new position (Translation)." },
        { q: "18. Which transformation is applied?", img: "18.jpg", opt: ["Rotation", "Dilation", "Translation", "Reflection"], ans: 0, why: "The image is turned around a fixed point (Rotation)." },
        { q: "19. Rule of the translation in the figure?", img: "19.jpg", opt: ["1-unit right", "2 up, 1 down", "1 right, 1 down", "2 units up"], ans: 2, why: "The object moved 1 unit right and 1 unit down." },
        { q: "20. Factor GCF: 2x²y³ + 14xy² - 18x³y", img: "", opt: ["A", "B", "C", "2xy(xy²+7y-9x²)"], ans: 3, why: "The Greatest Common Factor is 2xy." },
        { q: "21. Factor: m² + m – 90", img: "", opt: ["(m+10)(m+9)", "B", "C", "(m+10)(m-9)"], ans: 3, why: "Two numbers that multiply to -90 and add to +1 are +10 and -9." },
        { q: "22. Factors of 5n² + 12n + 4?", img: "", opt: ["(5n+2)(n+2)", "B", "C", "D"], ans: 0, why: "Expansion: (5n+2)(n+2) = 5n² + 10n + 2n + 4 = 5n² + 12n + 4." },
        { q: "23. Factor by grouping: 2p³+ 5p² + 6p + 15", img: "", opt: ["A", "(p²+3)(2p+5)", "C", "D"], ans: 1, why: "Group the terms and factor out common parts to get (p²+3)(2p+5)." },
        { q: "24. Factor: 9x² + 12xy + 4y²", img: "", opt: ["A", "B", "(3x+2y)²", "D"], ans: 2, why: "This is a Perfect Square Trinomial (a+b)²." },
        { q: "25. Factor: 25a² – 121b²", img: "", opt: ["A", "B", "C", "(5a+11b)(5a-11b)"], ans: 3, why: "Difference of Two Squares: (a² - b²) = (a+b)(a-b)." }
    ];

    let current = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let timeLeft = 90 * 60;

    function render() {
        const item = quizData[current];
        document.getElementById("q-progress").innerText = `Question ${current + 1} of ${quizData.length}`;
        document.getElementById("q-text").innerText = item.q;
        const img = document.getElementById("q-image");
        if(item.img) { img.src = item.img; img.style.display = "block"; } else { img.style.display = "none"; }

        const container = document.getElementById("options-container");
        container.innerHTML = "";
        item.opt.forEach((txt, i) => {
            const btn = document.createElement("button");
            btn.className = `option-btn ${userAnswers[current] === i ? 'selected' : ''}`;
            btn.innerHTML = `<b>${String.fromCharCode(65+i)}.</b> ${txt}`;
            btn.onclick = () => { userAnswers[current] = i; render(); };
            container.appendChild(btn);
        });

        document.getElementById("back-btn").style.visibility = current === 0 ? "hidden" : "visible";
        document.getElementById("next-btn").innerText = current === quizData.length - 1 ? "Submit Exam" : "Next";
    }

    function move(step) {
        if(current + step >= 0 && current + step < quizData.length) {
            current += step; render();
        } else if (current + step === quizData.length) {
            if(confirm("Submit your answers and see results?")) showResults();
        }
    }

    function showResults() {
        const score = userAnswers.filter((a, i) => a === quizData[i].ans).length;
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result-ui").style.display = "block";
        document.getElementById("final-score").innerText = `${score} / ${quizData.length}`;

        const list = document.getElementById("review-list");
        list.innerHTML = "";
        quizData.forEach((item, i) => {
            const isCorrect = userAnswers[i] === item.ans;
            const div = document.createElement("div");
            div.className = "review-item";
            div.innerHTML = `
                <span class="status-tag ${isCorrect ? 'status-correct' : 'status-wrong'}">
                    ${isCorrect ? '✓ Correct' : '✗ Wrong'}
                </span>
                <div style="font-weight:600; font-size:1.1rem; margin-bottom:8px;">Q${i+1}: ${item.q}</div>
                <div>
                    Your Answer: <span style="color:${isCorrect?'#28a745':'#dc3545'}">${userAnswers[i] !== null ? item.opt[userAnswers[i]] : 'Skipped'}</span><br>
                    Correct Answer: <span style="color:#28a745; font-weight:600;">${item.opt[item.ans]}</span>
                </div>
                <div class="why-box">💡 <b>Rationale:</b> ${item.why}</div>
            `;
            list.appendChild(div);
        });
    }

    const timer = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById("clock").innerText = `${m}:${s<10?'0':''}${s}`;
        if(timeLeft <= 0) showResults();
    }, 1000);

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false, tool = 'pen', pts = [];

    function togglePad() { document.getElementById('pad').classList.toggle('open'); setTimeout(resize, 500); }
    function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight - 80; ctx.lineCap='round'; ctx.lineJoin='round'; }
    function setTool(t) { tool = t; }
    function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }

    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        return { x: (e.clientX || e.touches[0].clientX) - r.left, y: (e.clientY || e.touches[0].clientY) - r.top };
    }

    canvas.onmousedown = canvas.ontouchstart = (e) => { if(e.type==='touchstart') e.preventDefault(); drawing = true; pts = [getPos(e)]; };
    canvas.onmousemove = canvas.ontouchmove = (e) => {
        if(!drawing) return;
        if(e.type==='touchmove') e.preventDefault();
        const p = getPos(e); pts.push(p);
        ctx.lineWidth = tool === 'pen' ? 3 : 40;
        ctx.strokeStyle = tool === 'pen' ? '#007bff' : '#fafcfe';
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        for(let i=1; i<pts.length-1; i++) {
            const xc = (pts[i].x + pts[i+1].x)/2, yc = (pts[i].y + pts[i+1].y)/2;
            ctx.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
        }
        ctx.stroke();
    };
    canvas.onmouseup = canvas.ontouchend = () => { drawing = false; pts = []; };

    window.onresize = resize;
    render();
</script>
</body>
</html>
